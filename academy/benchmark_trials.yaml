# Checkpoints compared by `benchmark_checkpoints.py`. Each entry overrides
# `framework`/`model.checkpoint`/`model.<framework>.variant` on top of the
# base --config (config.yaml) — dataset, imgsz, conf_threshold and benchmark
# warmup/iters all come from there, same as a normal infer.py run.
trials:
  - name: "YOLO11-N-seg"
    framework: "yolo"
    checkpoint: "finetuned_checkpoints/yolo-11-n.pt"
    variant: "yolo11n-seg"
  - name: "YOLO11-S-seg"
    framework: "yolo"
    checkpoint: "finetuned_checkpoints/yolo-11-s.pt"
    variant: "yolo11s-seg"
  - name: "YOLO11-M-seg"
    framework: "yolo"
    checkpoint: "finetuned_checkpoints/yolo-11-m.pt"
    variant: "yolo11m-seg"
  - name: "YOLO26-N-seg"
    framework: "yolo"
    checkpoint: "finetuned_checkpoints/yolo-26-n.pt"
    variant: "yolo26n-seg"
  - name: "YOLO26-S-seg"
    framework: "yolo"
    checkpoint: "finetuned_checkpoints/yolo-26-s.pt"
    variant: "yolo26s-seg"
  - name: "YOLO26-M-seg"
    framework: "yolo"
    checkpoint: "finetuned_checkpoints/yolo-26-m.pt"
    variant: "yolo26m-seg"
  - name: "RF-DETR Nano"
    framework: "rfdetr"
    checkpoint: "finetuned_checkpoints/rf-detr-n.pth"
    variant: "nano"
  - name: "RF-DETR Small"
    framework: "rfdetr"
    checkpoint: "finetuned_checkpoints/rf-detr-s.pth"
    variant: "small"
  - name: "RF-DETR Medium"
    framework: "rfdetr"
    checkpoint: "finetuned_checkpoints/rf-detr-m.pth"
    variant: "medium"
