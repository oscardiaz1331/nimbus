# SWIMSEG — Singapore Whole sky IMaging SEGmentation Database.
kind: binary_mask
name: swimseg
output_dir: datasets/swimnseg_yolo
class_id: 0
class_name: cloud
contour_epsilon: 0.001
min_contour_area: 10

binary_mask:
  root: datasets/swimseg
  images_subdir: images
  masks_subdir: GTmaps
  mask_suffixes: ["_GT.png", "_GT.jpg"]
  image_extensions: [".png", ".jpg"]
  split_ratios:
    train: 0.6
    valid: 0.2
    test: 0.2
  random_seed: 42
